<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="რკინა - ქართული მეტალ ბენდი" />
    <meta
      name="keywords"
      content="რკინა, მეტალი, ქართული, ბენდი, მუსიკა, როკ, მძიმე მუსიკა, ქართული როკი, ქართული მეტალი"
    />
    <meta name="author" content="რკინა" />
    <meta name="theme-color" content="#000000" />
    <meta name="og:title" content="რკინა" />
    <meta name="og:description" content="რკინა - ქართული მეტალ ბენდი" />
    <meta name="og:image" content="./assets/rkina-logo.png" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <title>რკინა</title>
  </head>
  <body>
    <canvas id="visualizer"></canvas>
    <div id="blur-overlay"></div>
    <main>
      <audio id="bg-audio" loop src="./assets/audio.mp3"></audio>
      <button id="play-pause-btn" aria-label="Play/Pause">
        <svg
          id="icon-play"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg
          id="icon-pause"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
          style="display: none"
        >
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>
      <img src="./assets/rkina-logo-transparent.png" alt="RKINA band logo" />
    </main>
  </body>
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
    }

    #visualizer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
    }

    #blur-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(6px);
      z-index: -1;
      pointer-events: none;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      max-width: 60%;
      max-height: 60%;
    }

    #play-pause-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }

    #play-pause-btn:hover {
      background: #fff;
      color: #000;
    }
  </style>
  <script>
    const audio = document.getElementById("bg-audio");
    const playPauseBtn = document.getElementById("play-pause-btn");
    const iconPlay = document.getElementById("icon-play");
    const iconPause = document.getElementById("icon-pause");
    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    // --- Visualizer Configuration ---
    const config = {
      //   color: "rgba(255, 255, 255, 0.8)", // Chaotic white
      color: "rgba(128, 128, 128, 0.8)", // Gray
      lineWidth: 2,
      innerRadius: 40, // Distance from the center
      barHeightMultiplier: 1.2, // How tall the spikes get
      trailDecay: "rgba(0, 0, 0, 0.3)", // Trail effect (lower opacity = longer trails)
      flameSize: 2, // Max size of the flame particles
      flameSpawnRate: 0.05, // Chance to spawn a flame per bar per frame (subtle by default)
      flameDecay: 0.03, // How fast flames fade away
      flameSpeed: 1, // How fast flames move outwards
    };

    let audioContext;
    let analyser;
    let dataArray;
    let source;
    let isVisualizerInitialized = false;
    let flames = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas(); // Set initial size

    function initVisualizer() {
      if (isVisualizerInitialized) return;

      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioContext = new AudioContext();
      analyser = audioContext.createAnalyser();

      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);

      // 256 fftSize means 128 frequency bands (bars)
      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      isVisualizerInitialized = true;
      drawVisualizer();
    }

    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);

      // Create a fading motion blur effect instead of a hard clear
      ctx.fillStyle = config.trailDecay;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!audio.paused) {
        analyser.getByteFrequencyData(dataArray);
      } else {
        // Slowly decay the bars back down when paused
        for (let i = 0; i < dataArray.length; i++) {
          dataArray[i] = Math.max(0, dataArray[i] - 4);
        }
      }

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = config.innerRadius;

      // High frequencies typically have zeros, so we only use the lower 70% of the frequency data
      const usableBars = Math.floor(dataArray.length * 0.75);

      // Draw symmetrically: map the usable bars to a half circle, and mirror it.
      const angleStep = Math.PI / usableBars;

      ctx.lineWidth = config.lineWidth;

      for (let i = 0; i < usableBars; i++) {
        const value = dataArray[i];

        // Add a slight random flicker to the height for a "frantic" feel
        const flicker = Math.random() * (value * 0.15);
        const barHeight = value * config.barHeightMultiplier + flicker;

        // Start angle at -PI/2 (top of the circle)
        const angle1 = i * angleStep - Math.PI / 2;
        const angle2 = -i * angleStep - Math.PI / 2;

        // Draw right side
        ctx.beginPath();
        ctx.moveTo(
          centerX + Math.cos(angle1) * radius,
          centerY + Math.sin(angle1) * radius,
        );
        ctx.lineTo(
          centerX + Math.cos(angle1) * (radius + barHeight),
          centerY + Math.sin(angle1) * (radius + barHeight),
        );
        ctx.strokeStyle = config.color;
        ctx.stroke();

        // Spawn right side flames
        if (value > 50 && Math.random() < config.flameSpawnRate) {
          flames.push({
            x: centerX + Math.cos(angle1) * (radius + barHeight),
            y: centerY + Math.sin(angle1) * (radius + barHeight),
            vx:
              Math.cos(angle1) *
              config.flameSpeed *
              (Math.random() * 0.5 + 0.5),
            vy:
              Math.sin(angle1) *
              config.flameSpeed *
              (Math.random() * 0.5 + 0.5),
            life: 1.0,
            size: Math.random() * config.flameSize + 0.5,
          });
        }

        // Draw left side (mirrored)
        if (i !== 0) {
          // prevent double drawing the top-center line
          ctx.beginPath();
          ctx.moveTo(
            centerX + Math.cos(angle2) * radius,
            centerY + Math.sin(angle2) * radius,
          );
          ctx.lineTo(
            centerX + Math.cos(angle2) * (radius + barHeight),
            centerY + Math.sin(angle2) * (radius + barHeight),
          );
          ctx.strokeStyle = config.color;
          ctx.stroke();

          // Spawn left side flames
          if (value > 50 && Math.random() < config.flameSpawnRate) {
            flames.push({
              x: centerX + Math.cos(angle2) * (radius + barHeight),
              y: centerY + Math.sin(angle2) * (radius + barHeight),
              vx:
                Math.cos(angle2) *
                config.flameSpeed *
                (Math.random() * 0.5 + 0.5),
              vy:
                Math.sin(angle2) *
                config.flameSpeed *
                (Math.random() * 0.5 + 0.5),
              life: 1.0,
              size: Math.random() * config.flameSize + 0.5,
            });
          }
        }
      }

      // Update and draw flames
      for (let i = flames.length - 1; i >= 0; i--) {
        let f = flames[i];
        f.x += f.vx;
        f.y += f.vy;
        f.life -= config.flameDecay;

        if (f.life <= 0) {
          flames.splice(i, 1);
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${f.life})`;
        ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    playPauseBtn.addEventListener("click", () => {
      // Must initialize or resume AudioContext after a user gesture
      if (!isVisualizerInitialized) {
        initVisualizer();
      }

      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume();
      }

      if (audio.paused) {
        audio.play();
        iconPlay.style.display = "none";
        iconPause.style.display = "block";
      } else {
        audio.pause();
        iconPlay.style.display = "block";
        iconPause.style.display = "none";
      }
    });
  </script>
</html>
