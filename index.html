<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="რკინა - ქართული მეტალ ბენდი" />
    <meta
      name="keywords"
      content="რკინა, მეტალი, ქართული, ბენდი, მუსიკა, როკ, მძიმე მუსიკა, ქართული როკი, ქართული მეტალი"
    />
    <meta name="author" content="რკინა" />
    <meta name="theme-color" content="#000000" />
    <meta name="og:title" content="რკინა" />
    <meta name="og:description" content="რკინა - ქართული მეტალ ბენდი" />
    <meta name="og:image" content="./assets/rkina-logo.png" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <title>რკინა</title>
  </head>
  <body>
    <main>
      <audio id="bg-audio" loop src="./assets/audio.mp3"></audio>
      <button id="play-pause-btn" aria-label="Play/Pause">
        <svg
          id="icon-play"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
        >
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg
          id="icon-pause"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="currentColor"
          style="display: none"
        >
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>
      <img src="./assets/rkina-logo-transparent.png" alt="RKINA band logo" />
    </main>
  </body>
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
    }

    main {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      max-width: 60%;
      max-height: 60%;
    }

    #play-pause-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: transparent;
      color: #fff;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 0;
    }

    #play-pause-btn:hover {
      background: #fff;
      color: #000;
    }
  </style>
  <script>
    const audio = document.getElementById("bg-audio");
    const playPauseBtn = document.getElementById("play-pause-btn");
    const iconPlay = document.getElementById("icon-play");
    const iconPause = document.getElementById("icon-pause");

    playPauseBtn.addEventListener("click", () => {
      if (audio.paused) {
        audio.play();
        iconPlay.style.display = "none";
        iconPause.style.display = "block";
      } else {
        audio.pause();
        iconPlay.style.display = "block";
        iconPause.style.display = "none";
      }
    });
  </script>
</html>
